name: Build & Deploy Backend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t mavens-api:latest -f ./Dockerfile .

      - name: 🚀 Deploy with Docker Compose
        run: |
          cd ~/apps/nest
          
          echo "Stopping old containers..."
          docker compose down
          
          echo "Starting new containers (using pre-built image)..."
          docker compose up -d  # NO --build flag!
          
          echo "Cleaning up..."
          docker image prune -f
          
          echo "✅ Deployment complete!"

      - name: 🏥 Health Check
        run: |
          sleep 15
          docker ps --filter "name=mavens-api"
          docker logs mavens-api --tail 30